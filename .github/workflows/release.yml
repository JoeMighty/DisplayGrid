name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual runs build everything but skip the publish job — lets us verify
  # all build stages without cutting a release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Build Next.js dashboard (standalone) ───────────────────────────────────
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build dashboard (standalone)
        working-directory: apps/dashboard
        run: pnpm build
        env:
          NEXTAUTH_SECRET: build-placeholder
          NEXTAUTH_URL: http://localhost:3000
          DB_PATH: /tmp/displaygrid.db

      - name: Stage dashboard build
        run: |
          STANDALONE="apps/dashboard/.next/standalone"

          # node-linker=hoisted in .npmrc makes pnpm write a flat node_modules
          # with real directories (no .pnpm/ virtual store, no symlinks).
          # The Next.js standalone traces deps into that same flat layout, so
          # the artifact is already portable — no post-processing required.

          # ── static / public / ws ──────────────────────────────────────────────
          mkdir -p "$STANDALONE/apps/dashboard/.next/static"
          cp -r apps/dashboard/.next/static/. "$STANDALONE/apps/dashboard/.next/static/"

          if [ -d apps/dashboard/public ] && [ "$(ls -A apps/dashboard/public)" ]; then
            mkdir -p "$STANDALONE/apps/dashboard/public"
            cp -r apps/dashboard/public/. "$STANDALONE/apps/dashboard/public/"
          fi

          cp apps/dashboard/ws-server.js "$STANDALONE/ws-server.js"

          # ── rsync to stage ────────────────────────────────────────────────────
          # With the hoisted layout the standalone ROOT node_modules holds all
          # traced runtime deps (next, react, better-sqlite3, …) — include it.
          mkdir -p /tmp/dashboard-stage
          rsync -a "$STANDALONE/" /tmp/dashboard-stage/

          # ws-server.js sits at the resources root; ws is not traced by the Next
          # build (only ws-server.js uses it), so copy it in if missing.
          if [ ! -d /tmp/dashboard-stage/node_modules/ws ]; then
            WS_DIR=$(node -e "console.log(require('path').dirname(require.resolve('ws/package.json',{paths:[process.cwd()+'/apps/dashboard']})))")
            mkdir -p /tmp/dashboard-stage/node_modules
            cp -rL "$WS_DIR" /tmp/dashboard-stage/node_modules/ws
          fi

      - name: Upload dashboard build
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: /tmp/dashboard-stage/
          retention-days: 1

  # ── Build display client (Vite) ────────────────────────────────────────────
  build-display-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build display client
        working-directory: apps/display-client
        run: pnpm build

      - name: Upload display client build
        uses: actions/upload-artifact@v4
        with:
          name: display-client-build
          path: apps/display-client/dist/
          retention-days: 1

  # ── Build Server App ───────────────────────────────────────────────────────
  build-server-app:
    needs: build-dashboard
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: --x64
          - os: macos-latest
            platform: mac
            arch: --universal
          - os: ubuntu-latest
            platform: linux
            arch: --x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libfuse2

      - name: Download dashboard build
        uses: actions/download-artifact@v4
        with:
          name: dashboard-build
          path: apps/dashboard-build/

      # The artifact is now the full standalone root (with static, public,
      # ws-server.js, and ws module already embedded). Just place it.
      - name: Prepare resources (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p apps/dashboard/.next/standalone
          cp -r apps/dashboard-build/. apps/dashboard/.next/standalone/

      - name: Prepare resources (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path apps/dashboard/.next/standalone
          Copy-Item -Path apps/dashboard-build/* -Destination apps/dashboard/.next/standalone/ -Recurse -Force

      - name: Rebuild native modules for Electron
        shell: bash
        run: |
          # Get the exact Electron version that was installed (resolves the ^ range).
          # node-linker=hoisted puts electron in the root node_modules; require.resolve
          # walks up from the app dir, so this works in any layout.
          ELECTRON_VERSION=$(node -p "require(require.resolve('electron/package.json',{paths:[process.cwd()+'/apps/electron-server']})).version")
          # Map matrix arch to @electron/rebuild --arch value
          REBUILD_ARCH="${{ matrix.platform == 'mac' && 'universal' || 'x64' }}"
          echo "Rebuilding native modules for Electron $ELECTRON_VERSION arch=$REBUILD_ARCH"
          # Rebuild better-sqlite3 inside the staged dashboard package so it uses
          # Electron's ABI instead of the Node.js ABI from the build machine.
          # (sharp is N-API and ABI-stable — no rebuild needed.)
          # With the hoisted layout the traced deps live at the standalone ROOT
          # node_modules. The package.json next to it is the monorepo root one,
          # which declares no runtime deps — and @electron/rebuild only rebuilds
          # modules reachable from the module-dir package.json's dependencies.
          # Patch better-sqlite3 in so the walker picks it up.
          STANDALONE="apps/dashboard/.next/standalone"
          node -e "
            const fs = require('fs');
            const p  = '$STANDALONE/package.json';
            const j  = fs.existsSync(p) ? JSON.parse(fs.readFileSync(p, 'utf8'))
                                        : { name: 'dashboard-standalone', version: '0.0.0' };
            j.dependencies = { ...(j.dependencies || {}), 'better-sqlite3': '*' };
            fs.writeFileSync(p, JSON.stringify(j, null, 2));
          "
          npx --yes @electron/rebuild \
            --force \
            --module-dir "$STANDALONE" \
            --version "$ELECTRON_VERSION" \
            --arch "$REBUILD_ARCH"
          # Strip node-gyp build intermediates (obj.target/, .deps/, *.o, *.a).
          # These are produced by the rebuild above but are not needed at runtime.
          # On macOS they also cause @electron/universal to fail when building the
          # universal DMG because the same intermediate file appears in both the
          # x64 and arm64 temp packages and is flagged as an ambiguous native file.
          NATIVE_MODS="$STANDALONE/node_modules"
          find "$NATIVE_MODS" -type d -name "obj.target" -exec rm -rf {} + 2>/dev/null || true
          find "$NATIVE_MODS" -type d -name ".deps"      -exec rm -rf {} + 2>/dev/null || true
          find "$NATIVE_MODS" -type f \( -name "*.o" -o -name "*.a" \) -delete 2>/dev/null || true

      - name: Build Server App
        working-directory: apps/electron-server
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.arch }} --config electron-builder.config.js --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Upload Server App artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-app-${{ matrix.platform }}
          path: |
            dist/electron-server/*.exe
            dist/electron-server/*.dmg
            dist/electron-server/*.AppImage
            dist/electron-server/*.deb
          retention-days: 1

  # ── Build Kiosk App ────────────────────────────────────────────────────────
  build-kiosk-app:
    needs: build-display-client
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: --x64
          - os: macos-latest
            platform: mac
            arch: --universal
          - os: ubuntu-latest
            platform: linux
            arch: --x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libfuse2

      - name: Download display client build
        uses: actions/download-artifact@v4
        with:
          name: display-client-build
          path: apps/display-client/dist/

      - name: Build Kiosk App
        working-directory: apps/electron-kiosk
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.arch }} --config electron-builder.config.js --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Upload Kiosk App artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-app-${{ matrix.platform }}
          path: |
            dist/electron-kiosk/*.exe
            dist/electron-kiosk/*.dmg
            dist/electron-kiosk/*.AppImage
            dist/electron-kiosk/*.deb
          retention-days: 1

  # ── Publish GitHub Release ─────────────────────────────────────────────────
  publish:
    needs: [build-server-app, build-kiosk-app]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          pattern: '*-app-*'
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: DisplayGrid ${{ github.ref_name }}
          body: |
            ## Downloads

            ### Server App (Dashboard + WebSocket server)
            Runs the DisplayGrid dashboard and WebSocket server in your system tray.

            | Platform | Download |
            |----------|----------|
            | Windows  | `DisplayGrid-Server-Setup.exe` |
            | macOS (Universal) | `DisplayGrid-Server.dmg` |
            | Linux x64 AppImage | `DisplayGrid-Server-x86_64.AppImage` |
            | Linux x64 Debian | `DisplayGrid-Server-amd64.deb` |

            ### Kiosk App (Display client)
            Fullscreen kiosk display for your signage screens.

            | Platform | Download |
            |----------|----------|
            | Windows  | `DisplayGrid-Kiosk-Setup.exe` |
            | macOS (Universal) | `DisplayGrid-Kiosk.dmg` |
            | Linux x64 AppImage | `DisplayGrid-Kiosk-x86_64.AppImage` |
            | Linux x64 Debian | `DisplayGrid-Kiosk-amd64.deb` |

            > **Raspberry Pi**: See the [Raspberry Pi Setup Guide](https://joemighty.github.io/DisplayGrid/guides/raspberry-pi.html) to run the kiosk using Chromium in kiosk mode.

          files: release-artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
