name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Build Next.js dashboard (standalone) ───────────────────────────────────
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build dashboard (standalone)
        working-directory: apps/dashboard
        run: pnpm build
        env:
          NEXTAUTH_SECRET: build-placeholder
          NEXTAUTH_URL: http://localhost:3000
          DB_PATH: /tmp/displaygrid.db

      - name: Upload dashboard build
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: |
            apps/dashboard/.next/standalone/
            apps/dashboard/.next/static/
            apps/dashboard/public/
            apps/dashboard/ws-server.js
          retention-days: 1

  # ── Build display client (Vite) ────────────────────────────────────────────
  build-display-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build display client
        working-directory: apps/display-client
        run: pnpm build

      - name: Upload display client build
        uses: actions/upload-artifact@v4
        with:
          name: display-client-build
          path: apps/display-client/dist/
          retention-days: 1

  # ── Build Server App ───────────────────────────────────────────────────────
  build-server-app:
    needs: build-dashboard
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libfuse2

      - name: Download dashboard build
        uses: actions/download-artifact@v4
        with:
          name: dashboard-build
          path: apps/dashboard-build/

      # Copy standalone build into expected locations for electron-builder
      - name: Prepare resources (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p apps/dashboard/.next
          cp -r apps/dashboard-build/standalone/. apps/dashboard/.next/standalone/
          cp -r apps/dashboard-build/static/. apps/dashboard/.next/static/
          cp -r apps/dashboard-build/public/. apps/dashboard/public/
          cp apps/dashboard-build/ws-server.js apps/dashboard/ws-server.js

      - name: Prepare resources (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path apps/dashboard/.next
          Copy-Item -Recurse -Force apps/dashboard-build/standalone/* apps/dashboard/.next/standalone/
          Copy-Item -Recurse -Force apps/dashboard-build/static/* apps/dashboard/.next/static/
          Copy-Item -Recurse -Force apps/dashboard-build/public/* apps/dashboard/public/
          Copy-Item -Force apps/dashboard-build/ws-server.js apps/dashboard/ws-server.js

      - name: Build Server App
        working-directory: apps/electron-server
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Server App artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-app-${{ matrix.platform }}
          path: |
            dist/electron-server/*.exe
            dist/electron-server/*.dmg
            dist/electron-server/*.AppImage
            dist/electron-server/*.deb
          retention-days: 1

  # ── Build Kiosk App ────────────────────────────────────────────────────────
  build-kiosk-app:
    needs: build-display-client
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libfuse2

      - name: Download display client build
        uses: actions/download-artifact@v4
        with:
          name: display-client-build
          path: apps/display-client/dist/

      - name: Build Kiosk App
        working-directory: apps/electron-kiosk
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Kiosk App artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-app-${{ matrix.platform }}
          path: |
            dist/electron-kiosk/*.exe
            dist/electron-kiosk/*.dmg
            dist/electron-kiosk/*.AppImage
            dist/electron-kiosk/*.deb
          retention-days: 1

  # ── Publish GitHub Release ─────────────────────────────────────────────────
  publish:
    needs: [build-server-app, build-kiosk-app]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          pattern: '*-app-*'
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: DisplayGrid ${{ github.ref_name }}
          body: |
            ## Downloads

            ### Server App (Dashboard + WebSocket server)
            Runs the DisplayGrid dashboard and WebSocket server in your system tray.

            | Platform | Download |
            |----------|----------|
            | Windows  | `DisplayGrid-Server-Setup-*.exe` |
            | macOS    | `DisplayGrid-Server-*.dmg` |
            | Linux x64 | `DisplayGrid-Server-*.AppImage` |
            | Linux ARM64 (Raspberry Pi) | `DisplayGrid-Server-*-arm64.AppImage` |

            ### Kiosk App (Display client)
            Fullscreen kiosk display for your signage screens.

            | Platform | Download |
            |----------|----------|
            | Windows  | `DisplayGrid-Kiosk-Setup-*.exe` |
            | macOS    | `DisplayGrid-Kiosk-*.dmg` |
            | Linux x64 | `DisplayGrid-Kiosk-*.AppImage` |
            | Linux ARM64 (Raspberry Pi) | `DisplayGrid-Kiosk-*-arm64.AppImage` |

          files: release-artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
