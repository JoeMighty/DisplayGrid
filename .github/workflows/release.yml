name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual runs build everything but skip the publish job — lets us verify
  # all build stages without cutting a release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Build Next.js dashboard (standalone) ───────────────────────────────────
  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The server serves browser displays at /display — build the display
      # client against that base path and ship it via the dashboard's public
      # dir. (The kiosk app uses its own separately-built copy.)
      - name: Build display client for /display
        working-directory: apps/display-client
        run: npx vite build --base=/display/ --outDir dist-web

      - name: Ship display client under dashboard public/
        run: |
          mkdir -p apps/dashboard/public
          rm -rf apps/dashboard/public/display
          cp -r apps/display-client/dist-web apps/dashboard/public/display

      - name: Build dashboard (standalone)
        working-directory: apps/dashboard
        run: pnpm build
        env:
          NEXTAUTH_SECRET: build-placeholder
          NEXTAUTH_URL: http://localhost:3000
          DB_PATH: /tmp/displaygrid.db

      - name: Stage dashboard build
        run: |
          STANDALONE="apps/dashboard/.next/standalone"

          # node-linker=hoisted in .npmrc makes pnpm write a flat node_modules
          # with real directories (no .pnpm/ virtual store, no symlinks).
          # The Next.js standalone traces deps into that same flat layout, so
          # the artifact is already portable — no post-processing required.

          # ── static / public / ws ──────────────────────────────────────────────
          mkdir -p "$STANDALONE/apps/dashboard/.next/static"
          cp -r apps/dashboard/.next/static/. "$STANDALONE/apps/dashboard/.next/static/"

          if [ -d apps/dashboard/public ] && [ "$(ls -A apps/dashboard/public)" ]; then
            mkdir -p "$STANDALONE/apps/dashboard/public"
            cp -r apps/dashboard/public/. "$STANDALONE/apps/dashboard/public/"
          fi

          cp apps/dashboard/ws-server.js "$STANDALONE/ws-server.js"

          # ── rsync to stage ────────────────────────────────────────────────────
          # With the hoisted layout the standalone ROOT node_modules holds all
          # traced runtime deps (next, react, better-sqlite3, …) — include it.
          mkdir -p /tmp/dashboard-stage
          rsync -a "$STANDALONE/" /tmp/dashboard-stage/

          # ws-server.js sits at the resources root; ws is not traced by the Next
          # build (only ws-server.js uses it), so copy it in if missing.
          if [ ! -d /tmp/dashboard-stage/node_modules/ws ]; then
            WS_DIR=$(node -e "console.log(require('path').dirname(require.resolve('ws/package.json',{paths:[process.cwd()+'/apps/dashboard']})))")
            mkdir -p /tmp/dashboard-stage/node_modules
            cp -rL "$WS_DIR" /tmp/dashboard-stage/node_modules/ws
          fi

      - name: Upload dashboard build
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: /tmp/dashboard-stage/
          retention-days: 1
          # v4 excludes dot-paths by default, which would silently drop the
          # entire apps/dashboard/.next tree (server chunks + static assets).
          include-hidden-files: true

  # ── Build display client (Vite) ────────────────────────────────────────────
  build-display-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build display client
        working-directory: apps/display-client
        run: pnpm build

      - name: Upload display client build
        uses: actions/upload-artifact@v4
        with:
          name: display-client-build
          path: apps/display-client/dist/
          retention-days: 1

  # ── Build Server App ───────────────────────────────────────────────────────
  build-server-app:
    needs: build-dashboard
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: --x64
          - os: macos-latest
            platform: mac
            arch: --universal
          - os: ubuntu-latest
            platform: linux
            arch: --x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libfuse2

      - name: Download dashboard build
        uses: actions/download-artifact@v4
        with:
          name: dashboard-build
          path: apps/dashboard-build/

      # The artifact is now the full standalone root (with static, public,
      # ws-server.js, and ws module already embedded). Just place it.
      - name: Prepare resources (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p apps/dashboard/.next/standalone
          cp -r apps/dashboard-build/. apps/dashboard/.next/standalone/

      - name: Prepare resources (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path apps/dashboard/.next/standalone
          Copy-Item -Path apps/dashboard-build/* -Destination apps/dashboard/.next/standalone/ -Recurse -Force

      - name: Replace native modules with platform builds
        shell: bash
        run: |
          # The dashboard artifact is traced on ubuntu, so its node_modules
          # carry LINUX native binaries. Every platform must swap in its own:
          # shipping the linux better_sqlite3.node broke Windows installs with
          # ERR_DLOPEN_FAILED ("not a valid Win32 application"). Fetch the
          # official Electron prebuilds directly into the shipped module —
          # @electron/rebuild's walker claimed success while updating the
          # repo-root copy instead of the standalone one, so it is not used.
          ELECTRON_VERSION=$(node -p "require(require.resolve('electron/package.json',{paths:[process.cwd()+'/apps/electron-server']})).version")
          STANDALONE="apps/dashboard/.next/standalone"
          BSQ="$STANDALONE/node_modules/better-sqlite3"
          BEFORE=$(sha256sum "$BSQ/build/Release/better_sqlite3.node" | cut -d' ' -f1)

          if [ "${{ matrix.platform }}" = "mac" ]; then
            # No universal prebuilds exist — fetch both arches and lipo them.
            # electron-builder's x64ArchFiles accepts the identical fat binary
            # in both slices of the universal build.
            ( cd "$BSQ" &&
              npx --yes prebuild-install --runtime=electron --target="$ELECTRON_VERSION" --arch=x64 --force &&
              mv build/Release/better_sqlite3.node /tmp/bsq-x64.node &&
              npx --yes prebuild-install --runtime=electron --target="$ELECTRON_VERSION" --arch=arm64 --force &&
              mv build/Release/better_sqlite3.node /tmp/bsq-arm64.node &&
              lipo -create /tmp/bsq-x64.node /tmp/bsq-arm64.node -output build/Release/better_sqlite3.node &&
              lipo -info build/Release/better_sqlite3.node )
          else
            ( cd "$BSQ" &&
              npx --yes prebuild-install --runtime=electron --target="$ELECTRON_VERSION" --arch=x64 --force )
          fi

          AFTER=$(sha256sum "$BSQ/build/Release/better_sqlite3.node" | cut -d' ' -f1)
          echo "better_sqlite3.node: $BEFORE -> $AFTER"
          if [ "${{ matrix.platform }}" != "linux" ] && [ "$BEFORE" = "$AFTER" ]; then
            echo "::error::better_sqlite3.node was not replaced for ${{ matrix.platform }} — the linux binary would ship"
            exit 1
          fi

          # sharp (image processing for uploads) also ships linux-only from the
          # artifact. Install the platform build in a scratch dir and merge it
          # in. NEVER npm-install inside the standalone: npm reifies against
          # the monorepo root package.json (no runtime deps) and prunes every
          # traced package as extraneous — v1.0.22 shipped with a gutted
          # node_modules exactly this way. macOS gets the runner-native arm64
          # build (Intel-mac uploads unsupported for now).
          SHARP_VERSION=$(node -p "require('./$STANDALONE/node_modules/sharp/package.json').version")
          SCRATCH=$(mktemp -d)
          ( cd "$SCRATCH" &&
            npm init -y > /dev/null &&
            npm install --no-save --omit=dev "sharp@$SHARP_VERSION" > /dev/null )
          rm -rf "$STANDALONE/node_modules/sharp" "$STANDALONE/node_modules/@img"
          rm -f "$SCRATCH/node_modules/.package-lock.json"
          cp -r "$SCRATCH/node_modules/." "$STANDALONE/node_modules/"
          node -e "require(process.cwd()+'/$STANDALONE/node_modules/sharp'); console.log('sharp loads OK on this platform')"

          # The standalone must still contain every traced runtime dependency —
          # fail hard if anything essential is missing before packaging.
          for m in next react react-dom ws better-sqlite3 styled-jsx sharp; do
            if [ ! -d "$STANDALONE/node_modules/$m" ]; then
              echo "::error::$m is missing from the standalone node_modules — refusing to package"
              exit 1
            fi
          done
          echo "standalone module presence check passed"

      # electron-updater compares the packaged app's version against the
      # update feed, so the app must carry the release version (the repo
      # package.json stays at a dev version).
      - name: Stamp app version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: npm pkg set version="${GITHUB_REF_NAME#v}" --prefix apps/electron-server

      - name: Build Server App
        working-directory: apps/electron-server
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.arch }} --config electron-builder.config.js --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Upload Server App artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-app-${{ matrix.platform }}
          path: |
            dist/electron-server/*.exe
            dist/electron-server/*.dmg
            dist/electron-server/*.AppImage
            dist/electron-server/*.deb
            dist/electron-server/*.yml
            dist/electron-server/*.blockmap
            !dist/electron-server/builder-debug.yml
          retention-days: 1

  # ── Build Kiosk App ────────────────────────────────────────────────────────
  build-kiosk-app:
    needs: build-display-client
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: --x64
          - os: macos-latest
            platform: mac
            arch: --universal
          - os: ubuntu-latest
            platform: linux
            arch: --x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libfuse2

      - name: Download display client build
        uses: actions/download-artifact@v4
        with:
          name: display-client-build
          path: apps/display-client/dist/

      # See the server job — packaged version must match the release tag for
      # electron-updater.
      - name: Stamp app version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: npm pkg set version="${GITHUB_REF_NAME#v}" --prefix apps/electron-kiosk

      - name: Build Kiosk App
        working-directory: apps/electron-kiosk
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.arch }} --config electron-builder.config.js --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1

      - name: Upload Kiosk App artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kiosk-app-${{ matrix.platform }}
          path: |
            dist/electron-kiosk/*.exe
            dist/electron-kiosk/*.dmg
            dist/electron-kiosk/*.AppImage
            dist/electron-kiosk/*.deb
            dist/electron-kiosk/*.yml
            dist/electron-kiosk/*.blockmap
            !dist/electron-kiosk/builder-debug.yml
          retention-days: 1

  # ── Docker image (server) ──────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            V="${GITHUB_REF_NAME#v}"
            echo "tags=ghcr.io/joemighty/displaygrid:${V},ghcr.io/joemighty/displaygrid:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=ghcr.io/joemighty/displaygrid:dev" >> "$GITHUB_OUTPUT"
          fi

      # Builds on every run (verification); pushes only on tags.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Publish GitHub Release ─────────────────────────────────────────────────
  publish:
    needs: [build-server-app, build-kiosk-app]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so the changelog can diff against the previous release
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
          pattern: '*-app-*'
          merge-multiple: true

      # This repo commits straight to main, so GitHub's PR-based release notes
      # come out empty — build the changelog from conventional-commit subjects.
      - name: Build release body
        shell: bash
        run: |
          cat > /tmp/release-body.md <<'BODY'
          ## Downloads

          ### Server App (Dashboard + WebSocket server)
          Runs the DisplayGrid dashboard and WebSocket server in your system tray.

          | Platform | Download |
          |----------|----------|
          | Windows  | `DisplayGrid-Server-Setup.exe` |
          | macOS (Universal) | `DisplayGrid-Server.dmg` |
          | Linux x64 AppImage | `DisplayGrid-Server-x86_64.AppImage` |
          | Linux x64 Debian | `DisplayGrid-Server-amd64.deb` |

          ### Kiosk App (Display client)
          Fullscreen kiosk display for your signage screens.

          | Platform | Download |
          |----------|----------|
          | Windows  | `DisplayGrid-Kiosk-Setup.exe` |
          | macOS (Universal) | `DisplayGrid-Kiosk.dmg` |
          | Linux x64 AppImage | `DisplayGrid-Kiosk-x86_64.AppImage` |
          | Linux x64 Debian | `DisplayGrid-Kiosk-amd64.deb` |

          > **Raspberry Pi**: See the [Raspberry Pi Setup Guide](https://joemighty.github.io/DisplayGrid/guides/raspberry-pi.html) to run the kiosk using Chromium in kiosk mode.

          ### Docker (Server)

          ```
          docker pull ghcr.io/joemighty/displaygrid:latest
          ```

          BODY
          PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          RANGE=${PREV:+$PREV..}$GITHUB_REF_NAME
          feats=$(git log $RANGE --no-merges --pretty="%s" | grep -E "^feat(\(|:)"  | sed -E "s/^feat(\([^)]*\))?: /- /" || true)
          fixes=$(git log $RANGE --no-merges --pretty="%s" | grep -E "^fix(\(|:)"   | sed -E "s/^fix(\([^)]*\))?: /- /"  || true)
          other=$(git log $RANGE --no-merges --pretty="%s" | grep -vE "^(feat|fix)(\(|:)" | sed -E "s/^(docs|perf|design|ci|license|chore|refactor|test)(\([^)]*\))?: /- /; s/^([^-])/- \1/" || true)
          {
            echo "## What's changed"
            [ -n "$feats" ] && printf "\n### Added\n%s\n" "$feats"
            [ -n "$fixes" ] && printf "\n### Fixed\n%s\n" "$fixes"
            [ -n "$other" ] && printf "\n### Changed\n%s\n" "$other"
            [ -n "$PREV" ] && printf "\n**Full changelog**: https://github.com/JoeMighty/DisplayGrid/compare/%s...%s\n" "$PREV" "$GITHUB_REF_NAME"
          } >> /tmp/release-body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: DisplayGrid ${{ github.ref_name }}
          body_path: /tmp/release-body.md
          files: release-artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
